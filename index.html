<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Sport Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --purple: #bc13fe; }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .panel-sport { background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid #333; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); }
        .lcd-display { background: #050505; border-radius: 12px; box-shadow: inset 0 0 20px #000; border: 1px solid #222; }
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 1.5s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .tab-content { display: none; height: calc(100vh - 220px); overflow-y: auto; padding: 5px; }
        .active { display: block; }
        .nav-btn { transition: 0.3s; opacity: 0.3; }
        .active-nav { opacity: 1; transform: scale(1.2); color: var(--neon); }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .big-input { background: #111; border: 2px solid #444; border-radius: 15px; padding: 18px; color: white; font-size: 22px; width: 100%; outline: none; font-weight: bold; }
        .big-input:focus { border-color: var(--neon); }
        .big-input:disabled { opacity: 0.2; background: #000; border-color: #222; }
        label { font-size: 16px; font-weight: 900; color: #aaa; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .odo-input { background: transparent; border: none; color: var(--neon); font-family: 'Digital Numbers', sans-serif; font-size: 42px; text-align: center; width: 100%; outline: none; }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div id="boot" class="fixed inset-0 bg-black z-[9000] flex flex-col items-center justify-center">
        <div class="digital-glow text-2xl animate-pulse uppercase">Smart Fuel Pro</div>
        <p id="boot-msg" class="text-gray-600 mt-4 font-bold uppercase">Conectando...</p>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-2">
        <header class="text-center mb-4">
            <h1 id="ui-car-name" class="text-2xl font-black italic tracking-tighter uppercase">Smart Fuel</h1>
            <div class="h-1 w-12 bg-cyan-500 mx-auto mt-1 rounded-full shadow-[0_0_10px_#00f2ff]"></div>
        </header>

        <!-- DASHBOARD -->
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-5 text-center">
                    <p class="text-[14px] font-black text-cyan-400 uppercase mb-3">Consumo</p>
                    <svg class="w-full h-24 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-cons" class="gauge-fill stroke-cyan-500" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-cons" class="text-3xl font-black italic">--</span></div>
                </div>
                <div class="panel-sport p-5 text-center">
                    <p class="text-[14px] font-black text-purple-500 uppercase mb-3">Tanque</p>
                    <svg class="w-full h-24 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill stroke-purple-600" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-tank" class="text-3xl font-black italic">--</span></div>
                </div>
            </div>

            <div class="panel-sport p-5 text-center">
                <p class="text-[12px] font-black text-gray-500 uppercase mb-2">Km Atual (Input)</p>
                <div class="lcd-display py-2">
                    <input type="number" id="v-odo" class="odo-input" inputmode="decimal" oninput="recalcHome()">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-5 lcd-display border-none text-center">
                    <p class="text-[14px] font-black text-gray-400 uppercase mb-1">Km Viagem</p>
                    <span id="v-dist" class="text-3xl font-black italic">0</span>
                </div>
                <div class="panel-sport p-5 lcd-display border-none text-center">
                    <p class="text-[14px] font-black text-gray-400 uppercase mb-1">Gasto (L)</p>
                    <span id="v-spent" class="text-3xl font-black text-purple-400 italic">0</span>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div id="history" class="tab-content">
            <h2 class="text-2xl font-black uppercase italic mb-4 border-l-4 border-cyan-500 pl-3">Log Atividades</h2>
            <div id="hist-list" class="space-y-3 pb-20"></div>
        </div>

        <!-- GRÁFICO -->
        <div id="charts" class="tab-content">
            <h2 class="text-2xl font-black uppercase italic mb-4 border-l-4 border-purple-500 pl-3">Performance</h2>
            <div class="panel-sport p-4 h-72"><canvas id="mainChart"></canvas></div>
        </div>

        <!-- CONFIG -->
        <div id="settings" class="tab-content pt-4 space-y-6">
            <h2 class="text-2xl font-black uppercase italic mb-4 text-center">Configurações</h2>
            <div class="panel-sport p-6 space-y-4">
                <label>Nome do Veículo</label>
                <input type="text" id="c-name" class="big-input" placeholder="Ex: Hyundai I-30">
                <label>Capacidade do Tanque (L)</label>
                <input type="number" id="c-tank" class="big-input" inputmode="decimal" placeholder="Ex: 53">
                <button onclick="saveSettings()" class="w-full bg-cyan-500 p-4 rounded-2xl font-black text-black text-xl uppercase mt-4">Salvar Config</button>
            </div>
        </div>

        <!-- MENU -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] h-20 panel-sport flex justify-around items-center px-6 z-[4000]">
            <button onclick="tab('home', this)" class="nav-btn active-nav text-3xl">🏠</button>
            <button onclick="tab('history', this)" class="nav-btn text-3xl">📊</button>
            <div onclick="openM()" class="bg-cyan-500 w-16 h-16 rounded-full flex items-center justify-center text-black text-4xl font-bold shadow-[0_0_20px_#00f2ff] -translate-y-8 border-4 border-black">+</div>
            <button onclick="tab('charts', this)" class="nav-btn text-3xl">📈</button>
            <button onclick="tab('settings', this)" class="nav-btn text-3xl">⚙️</button>
        </nav>
    </div>

    <!-- MODAL NOVO ABASTECIMENTO -->
    <div id="modal">
        <div class="panel-sport w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black uppercase italic text-cyan-400 text-center">Novo Abastecimento</h3>
            
            <div class="grid grid-cols-2 gap-4">
                <div><label>Odômetro</label><input type="number" id="i-odo" class="big-input" inputmode="decimal"></div>
                <div><label>Km Viagem</label><input type="number" id="i-dist" class="big-input" inputmode="decimal"></div>
            </div>

            <div><label>Litros</label><input type="number" id="i-lit" step="0.01" class="big-input" inputmode="decimal" oninput="calcPrice()"></div>
            <div><label>Posto</label><input type="text" id="i-st" list="postos-list" class="big-input" placeholder="Nome do Posto"></div>
            <datalist id="postos-list"></datalist>

            <div>
                <label>Nível do Tanque</label>
                <select id="i-tank-lvl" class="big-input" onchange="unlockTotal()">
                    <option value="">Selecione...</option>
                    <option value="Full Tank - refresh">Tanque Cheio</option>
                    <option value="Parcial">Parcial</option>
                </select>
            </div>

            <div id="total-wrapper" onclick="warnLock()">
                <label id="total-label">Total R$ (Bloqueado)</label>
                <input type="number" id="i-tot" step="0.01" class="big-input" inputmode="decimal" disabled oninput="calcPrice()">
            </div>

            <div class="lcd-display p-4 text-center">
                <label>Preço por Litro</label>
                <div id="v-price" class="text-3xl font-black text-cyan-400">R$ 0,00</div>
            </div>

            <div class="flex gap-4 pt-2">
                <button onclick="closeM()" class="flex-1 font-bold text-gray-500 uppercase">Sair</button>
                <button onclick="saveData()" id="btn-save" class="flex-1 bg-cyan-500 p-4 rounded-2xl font-black text-black uppercase text-xl">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybJAi3Js_FDbIQ_s6Mm6-wI-cNE3krCUEurkDWulhpcOr6ur-EQLepQ5cbGGE9x23SoA/exec";
        let tank_cap = 53, chart, lastDb, allLogs = [];

        async function sync() {
            try {
                const r = await fetch(SCRIPT_URL);
                const d = await r.json();
                allLogs = d.logs || d;
                lastDb = allLogs[allLogs.length - 1];

                if(d.config) {
                    tank_cap = parseFloat(d.config.tank_capacity) || 53;
                    document.getElementById('ui-car-name').innerText = d.config.car_name;
                    document.getElementById('c-name').value = d.config.car_name;
                    document.getElementById('c-tank').value = tank_cap;
                }

                const postos = [...new Set(allLogs.map(l => l[9]))];
                document.getElementById('postos-list').innerHTML = postos.map(p => `<option value="${p}">`).join('');

                document.getElementById('v-odo').value = lastDb[3];
                recalcHome();
                renderHistory();
                renderChart();
                document.getElementById('boot').style.display = 'none';
            } catch (e) { document.getElementById('boot-msg').innerText = "ERRO DE CONEXÃO"; }
        }

        function recalcHome() {
            const currentOdo = parseFloat(document.getElementById('v-odo').value) || 0;
            const trip = currentOdo - parseFloat(lastDb[3]);
            const kmL_prev = parseFloat(lastDb[12]) || 7.0;
            const isFull = lastDb[13].includes("Full");
            
            // Lógica de Consumo: se o último foi cheio, usa Km/L atual. Senão anterior.
            const consumed = trip / kmL_prev;
            const remaining = tank_cap - consumed;

            document.getElementById('v-cons').innerText = kmL_prev.toFixed(2);
            document.getElementById('v-tank').innerText = Math.max(0, remaining).toFixed(1);
            document.getElementById('v-dist').innerText = trip > 0 ? trip : 0;
            document.getElementById('v-spent').innerText = consumed > 0 ? consumed.toFixed(2) : 0;

            document.getElementById('f-cons').style.strokeDashoffset = 188.5 - (188.5 * Math.min(kmL_prev/15, 1));
            document.getElementById('f-tank').style.strokeDashoffset = 188.5 - (188.5 * Math.min(remaining/tank_cap, 1));
        }

        function unlockTotal() {
            const lvl = document.getElementById('i-tank-lvl').value;
            const input = document.getElementById('i-tot');
            const label = document.getElementById('total-label');
            if(lvl !== "") {
                input.disabled = false;
                label.innerText = "Total R$ (Liberado)";
                label.style.color = "var(--neon)";
            } else {
                input.disabled = true;
                label.innerText = "Total R$ (Bloqueado)";
                label.style.color = "#666";
            }
        }

        function warnLock() {
            if(document.getElementById('i-tot').disabled) alert("Selecione primeiro o Nível do Tanque!");
        }

        function calcPrice() {
            const tot = document.getElementById('i-tot').value;
            const lit = document.getElementById('i-lit').value;
            if(tot && lit) document.getElementById('v-price').innerText = "R$ " + (tot/lit).toFixed(2);
        }

        async function saveData() {
            const btn = document.getElementById('btn-save'); btn.innerText = "SALVANDO...";
            const payload = {
                odo: document.getElementById('i-odo').value,
                dist: document.getElementById('i-dist').value,
                liters: document.getElementById('i-lit').value,
                total: document.getElementById('i-tot').value,
                station: document.getElementById('i-st').value,
                tankLevel: document.getElementById('i-tank-lvl').value,
                date: new Date().toLocaleDateString('pt-BR')
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            closeM(); sync();
            btn.innerText = "SALVAR";
        }

        async function saveSettings() {
            const payload = { car_name: document.getElementById('c-name').value, tank_capacity: document.getElementById('c-tank').value };
            await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ type:'config', payload: payload }) });
            alert("Configurações Salvas!");
            sync();
        }

        function renderHistory() {
            document.getElementById('hist-list').innerHTML = allLogs.slice().reverse().map(l => `
                <div class="panel-sport p-5 flex justify-between items-center bg-zinc-900/40 mb-3">
                    <div>
                        <p class="text-xl font-black italic text-white uppercase mb-1">${l[9] || 'POSTO'}</p>
                        <p class="text-xs text-gray-500 font-bold">${l[1].split('T')[0]}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold text-cyan-400">${l[3]} KM</p>
                        <p class="text-sm text-purple-400 font-black">${l[8]} L</p>
                    </div>
                </div>`).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            const last8 = allLogs.slice(-8);
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last8.map(l => l[1].split('T')[0].substring(5)),
                    datasets: [{ data: last8.map(l => parseFloat(l[12]) || 0), borderColor: '#00f2ff', fill: true, backgroundColor: 'rgba(0,242,255,0.1)', tension: 0.4 }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { ticks: { color: '#888', font: { size: 16, weight: 'bold' } }, grid: { color: '#222' } },
                        x: { ticks: { color: '#888', font: { size: 14, weight: 'bold' } } }
                    } 
                }
            });
        }

        function tab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            btn.classList.add('active-nav');
        }
        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        window.onload = sync;
    </script>
</body>
</html>
