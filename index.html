<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Sport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --accent: #00f2ff; --gauge: #bc13fe; }
        body { background: radial-gradient(circle at center, #111827 0%, #000 100%); color: white; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        .panel-glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 15px 35px rgba(0,0,0,0.7); }
        .led-display { background: #050505; border: 2px solid #222; border-radius: 12px; box-shadow: inset 0 0 10px #000; }
        .digital-font { font-family: 'Digital Numbers', sans-serif; color: var(--accent); text-shadow: 0 0 8px var(--accent); }
        .gauge-fill { fill: none; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div id="loading" class="fixed inset-0 bg-black z-[1000] flex items-center justify-center text-cyan-400 font-bold animate-pulse italic">SYSTEM ONLINE...</div>

    <div class="w-full max-w-sm h-full flex flex-col pt-8">
        <header class="text-center mb-4">
            <h1 id="ui-car-name" class="text-3xl font-black italic text-white uppercase italic tracking-tighter">Smart Fuel</h1>
            <div id="ui-line" class="h-[1px] w-16 bg-cyan-500 mx-auto mt-1 opacity-50"></div>
        </header>

        <!-- Gauges boca para baixo -->
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="panel-glass p-4 text-center">
                <p class="text-[8px] opacity-30 uppercase mb-3">Efficiency</p>
                <svg class="w-[140px] mx-auto" viewBox="0 0 140 80">
                    <path fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10" d="M 20 70 A 50 50 0 1 1 120 70" />
                    <path id="fill-cons" class="gauge-fill stroke-cyan-400" d="M 20 70 A 50 50 0 1 1 120 70" />
                </svg>
                <div class="mt-[-35px] text-xl font-black" id="val-cons">--</div>
            </div>
            <div class="panel-glass p-4 text-center">
                <p class="text-[8px] opacity-30 uppercase mb-3">Fuel Level</p>
                <svg class="w-[140px] mx-auto" viewBox="0 0 140 80">
                    <path fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10" d="M 20 70 A 50 50 0 1 1 120 70" />
                    <path id="fill-tank" class="gauge-fill stroke-purple-600" d="M 20 70 A 50 50 0 1 1 120 70" />
                </svg>
                <div class="mt-[-35px] text-xl font-black" id="val-tank">--</div>
            </div>
        </div>

        <!-- Odômetro -->
        <div class="panel-glass p-5 text-center mb-4 border-b-2 border-cyan-500/20">
            <p class="text-[9px] opacity-30 uppercase mb-2 text-cyan-400 font-bold">Total Odometer</p>
            <div class="led-display py-2 px-4 inline-block mb-4"><span id="current-odo" class="digital-font text-2xl tracking-widest">000000</span></div>
            <div class="flex gap-2">
                <input type="number" id="new-odo" placeholder="Novo KM" class="flex-1 bg-black/60 border border-white/5 p-3 rounded-xl text-center text-sm text-cyan-400 outline-none">
                <button onclick="saveOdo()" class="bg-white/5 px-4 rounded-xl text-[10px] font-black uppercase">Sync</button>
            </div>
        </div>

        <!-- Novos Cards (Km e L) -->
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="panel-glass p-4 led-display border-none">
                <p class="text-[8px] opacity-40 uppercase mb-1">Trip Distance</p>
                <span id="card-dist" class="text-xl font-black italic text-white">--</span> <span class="text-[9px] opacity-20 italic font-bold">Km</span>
            </div>
            <div class="panel-glass p-4 led-display border-none">
                <p class="text-[8px] opacity-40 uppercase mb-1">Spent Fuel</p>
                <span id="card-spent" class="text-xl font-black text-purple-400 italic">--</span> <span class="text-[9px] opacity-20 italic font-bold">Lts</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="panel-glass p-5 mt-auto mb-6 flex justify-between items-center bg-cyan-950/10 text-xs">
            <p id="l-station" class="font-bold italic truncate w-32">Posto Paz</p>
            <p id="l-total" class="font-black text-white">R$ 0.00</p>
        </div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_lNzRoZj2t0B4UPGoKSQjSiZ7eEgnAXnBReDlqsAmWD04-2Vn136HjIvE6zBgMnKuHw/exec";
        let TANK_CAPACITY = 53;

        async function fetchData() {
            try {
                const r = await fetch(SCRIPT_URL);
                const data = await r.json();
                
                if (data.config) {
                    const c = data.config;
                    document.getElementById('ui-car-name').innerText = c.car_name || "Smart Fuel";
                    TANK_CAPACITY = parseFloat(c.tank_capacity) || 53;
                    document.documentElement.style.setProperty('--accent', c.accent_color || '#00f2ff');
                }

                const last = data.logs[data.logs.length - 1];
                const odo = last[3], distTrip = last[4], spentL = last[8], kmL = parseFloat(last[12]);

                document.getElementById('current-odo').innerText = odo.toString().padStart(6, '0');
                document.getElementById('val-cons').innerText = kmL.toFixed(2);
                document.getElementById('card-dist').innerText = last[4]; // Km da linha
                document.getElementById('card-spent').innerText = last[8]; // L da linha
                document.getElementById('l-station').innerText = last[9];
                document.getElementById('l-total').innerText = last[10];

                const rest = TANK_CAPACITY - (parseFloat(last[4]) / (kmL || 1));
                document.getElementById('val-tank').innerText = rest.toFixed(1);

                setTimeout(() => {
                    document.getElementById('fill-cons').style.strokeDashoffset = 188.5 - (188.5 * Math.min(kmL/15, 1));
                    document.getElementById('fill-tank').style.strokeDashoffset = 188.5 - (188.5 * Math.min(rest/TANK_CAPACITY, 1));
                    document.getElementById('loading').style.display = 'none';
                }, 400);
            } catch (e) { console.error(e); }
        }

        async function saveOdo() {
            const val = document.getElementById('new-odo').value;
            if(!val) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ odo: val, dist: 0, liters: 1, station: "Update", total: 0 }) });
            fetchData();
        }
        window.onload = fetchData;
    </script>
</body>
</html>
