<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Fuel Sport Master V21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --bg: #000; --text: #ffffff; }
        body.light-mode { --bg: #f1f5f9; --text: #000; --neon: #0284c7; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .panel-sport { background: linear-gradient(145deg, #1a1a1a, #000); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        body.light-mode .panel-sport { background: #fff; border-color: #cbd5e1; }
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 0.5s; stroke: var(--neon); }
        .tab-content { display: none; height: calc(100vh - 180px); overflow-y: auto; padding: 15px; }
        .active { display: flex; flex-direction: column; }
        .nav-glass { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 70px; background: rgba(20,20,20,0.8); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 5000; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { color: white; opacity: 0.4; font-size: 10px; font-weight: 900; }
        .active-nav { opacity: 1; color: var(--neon); }
        .odo-input { background: transparent; border: none; color: var(--neon); font-family: 'Digital Numbers', sans-serif; font-size: 40px; text-align: center; width: 100%; outline: none; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="flex justify-center">

    <!-- TELA DE CARREGAMENTO -->
    <div id="boot" class="fixed inset-0 bg-black z-[9000] flex flex-col items-center justify-center text-center">
        <div class="digital-glow text-3xl animate-pulse">SMART FUEL V21</div>
        <p class="text-gray-500 mt-4 text-[10px] tracking-widest uppercase">Iniciando Sistemas...</p>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-10 px-4">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic uppercase italic">Smart Fuel</h1>
                <span id="ui-car" class="text-[10px] font-bold text-cyan-500 uppercase">Sincronizando...</span>
            </div>
            <button onclick="document.body.classList.toggle('light-mode')" class="panel-sport px-4 py-2 text-[10px] font-bold rounded-full">MODO</button>
        </header>

        <!-- DASHBOARD -->
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-bold opacity-50 uppercase mb-2">Gasto (L)</p>
                    <svg class="w-full h-20" viewBox="0 0 140 80">
                        <path fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-spent" class="gauge-fill" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-35px] font-black text-xl" id="v-spent">0.00</div>
                </div>
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-bold opacity-50 uppercase mb-2">Tanque (L)</p>
                    <svg class="w-full h-20" viewBox="0 0 140 80">
                        <path fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-35px] font-black text-xl" id="v-tank">--</div>
                </div>
            </div>

            <div class="panel-sport p-4 text-center">
                <p class="text-[10px] font-bold opacity-30 uppercase">Odômetro Atual (Simular)</p>
                <input type="number" id="v-odo" class="odo-input" oninput="recalcHome()">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-bold opacity-50 uppercase">Km Percorrido</p>
                    <span id="v-dist" class="text-3xl font-black italic">0</span>
                </div>
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-bold opacity-50 uppercase">Média Km/L</p>
                    <span id="v-cons" class="text-3xl font-black italic">--</span>
                </div>
            </div>
        </div>

        <nav class="nav-glass">
            <button onclick="tab('home')" class="nav-btn active-nav">PAINEL</button>
            <div onclick="openM()" class="bg-cyan-500 w-12 h-12 rounded-full flex items-center justify-center text-black text-2xl font-bold shadow-lg">+</div>
            <button onclick="tab('home')" class="nav-btn">AJUSTES</button>
        </nav>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxPAcB9qDT4LDG7bMo-RyJpIZIJkJ4x6ZO4zlRCljI1YPzYwLooRNfLSRjma3vkXxZ8/exec";
        let tank_cap = 53, lastOdoVal = 0, lastLitros = 0, lastTankType = "Full", kmLAnterior = 8.0;

        async function sync() {
            // FORÇA ABRIR O APP EM 3 SEGUNDOS INDEPENDENTE DE ERRO
            setTimeout(() => { document.getElementById('boot').style.display = 'none'; }, 3000);

            try {
                const r = await fetch(URL);
                const d = await r.json();
                const logs = d.logs || d;
                const activeCar = d.config ? d.config.active_car : "Hyundai I-30";
                tank_cap = d.config ? parseFloat(d.config.tank_capacity) : 53;

                const carLogs = logs.filter(l => l[2] === activeCar);
                const last = carLogs[carLogs.length - 1];
                const prev = carLogs[carLogs.length - 2] || last;

                if(last) {
                    lastOdoVal = parseFloat(last[3]) || 0;
                    lastLitros = parseFloat(last[8]) || 0;
                    lastTankType = last[13] || "Full";
                    kmLAnterior = parseFloat(prev[12]) || 8.0;

                    document.getElementById('v-odo').value = lastOdoV
