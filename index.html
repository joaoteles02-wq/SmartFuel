<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Sport Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --purple: #bc13fe; }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .panel-sport { background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid #333; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); }
        .lcd-display { background: #050505; border-radius: 12px; box-shadow: inset 0 0 20px #000; border: 1px solid #222; }
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 2s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .tab-content { display: none; height: calc(100vh - 220px); overflow-y: auto; padding: 5px; }
        .active { display: block; }
        .nav-btn { transition: 0.3s; opacity: 0.3; transform: scale(0.9); }
        .active-nav { opacity: 1; transform: scale(1.2); color: var(--neon); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 30px; align-items: center; justify-content: center; }
        input { background: #111; border: 2px solid #333; border-radius: 15px; padding: 15px; color: white; font-size: 18px; width: 100%; outline: none; }
        label { font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase; margin-left: 5px; }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div id="boot" class="fixed inset-0 bg-black z-[9000] flex flex-col items-center justify-center">
        <div class="digital-glow text-2xl animate-pulse uppercase tracking-[0.3em]">Smart Fuel</div>
        <p id="boot-msg" class="text-gray-600 mt-4 font-bold">CARREGANDO SISTEMA...</p>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-4">
        
        <header class="text-center mb-6">
            <h1 id="car-title" class="text-3xl font-black italic tracking-tighter uppercase text-white">Smart Fuel</h1>
            <div class="h-1.5 w-16 bg-cyan-500 mx-auto mt-1 rounded-full shadow-[0_0_10px_#00f2ff]"></div>
        </header>

        <!-- DASHBOARD -->
        <div id="home" class="tab-content active space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <!-- Gauge Consumo -->
                <div class="panel-sport p-5 text-center">
                    <p class="text-[12px] font-black text-cyan-400 uppercase mb-4 tracking-widest">Consumo</p>
                    <svg class="w-full h-24 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-cons" class="gauge-fill stroke-cyan-500" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-cons" class="text-3xl font-black italic">--</span><p class="text-[10px] opacity-40 font-bold">Km/L</p></div>
                </div>
                <!-- Gauge Tanque -->
                <div class="panel-sport p-5 text-center">
                    <p class="text-[12px] font-black text-purple-500 uppercase mb-4 tracking-widest">Tanque</p>
                    <svg class="w-full h-24 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill stroke-purple-600" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-tank" class="text-3xl font-black italic">--</span><p class="text-[10px] opacity-40 font-bold">Litros</p></div>
                </div>
            </div>

            <!-- Odômetro Gigante -->
            <div class="panel-sport p-6 text-center">
                <p class="text-[12px] font-black text-gray-500 uppercase mb-3 tracking-widest">Odômetro Total</p>
                <div class="lcd-display py-4 px-8 inline-block border-cyan-900/20">
                    <span id="v-odo" class="digital-glow text-4xl tracking-[6px]">000000</span>
                </div>
            </div>

            <!-- Cards Trip -->
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-5 lcd-display border-none">
                    <p class="text-[11px] font-black text-gray-500 uppercase mb-1">Distância</p>
                    <span id="v-dist" class="text-2xl font-black italic">0</span><span class="text-xs ml-1 opacity-30">Km</span>
                </div>
                <div class="panel-sport p-5 lcd-display border-none">
                    <p class="text-[11px] font-black text-gray-500 uppercase mb-1">Gasto (Viagem)</p>
                    <span id="v-spent" class="text-2xl font-black text-purple-400 italic">0</span><span class="text-xs ml-1 opacity-30">L</span>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div id="history" class="tab-content">
            <h2 class="text-2xl font-black uppercase italic mb-6 border-l-8 border-cyan-500 pl-4">Histórico</h2>
            <div id="hist-list" class="space-y-4 pb-20"></div>
        </div>

        <!-- GRÁFICO -->
        <div id="charts" class="tab-content">
            <h2 class="text-2xl font-black uppercase italic mb-6 border-l-8 border-purple-500 pl-4">Performance</h2>
            <div class="panel-sport p-4 h-72"><canvas id="mainChart"></canvas></div>
        </div>

        <!-- MENU INFERIOR -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] h-20 panel-sport flex justify-around items-center px-6 z-[4000]">
            <button onclick="tab('home', this)" class="nav-btn active-nav text-3xl">🏠</button>
            <button onclick="tab('history', this)" class="nav-btn text-3xl">📊</button>
            <div onclick="openM()" class="bg-cyan-500 w-16 h-16 rounded-full flex items-center justify-center text-black text-4xl font-bold shadow-[0_0_20px_#00f2ff] -translate-y-8 border-4 border-black">+</div>
            <button onclick="tab('charts', this)" class="nav-btn text-3xl">📈</button>
            <button class="nav-btn text-3xl opacity-20">⚙️</button>
        </nav>
    </div>

    <!-- MODAL FORMULÁRIO -->
    <div id="modal">
        <div class="panel-sport w-full p-8 space-y-4">
            <h3 class="text-2xl font-black uppercase italic text-cyan-400 mb-6">Novo Abastecimento</h3>
            <div><label>Odômetro Atual</label><input type="number" id="i-odo"></div>
            <div><label>Distância da Viagem (Km)</label><input type="number" id="i-dist"></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Litros</label><input type="number" id="i-lit" step="0.01"></div>
                <div><label>Total R$</label><input type="number" id="i-tot" step="0.01"></div>
            </div>
            <div><label>Posto</label><input type="text" id="i-st"></div>
            <div class="flex gap-4 pt-6">
                <button onclick="closeM()" class="flex-1 font-bold text-gray-500 uppercase">Sair</button>
                <button onclick="saveData()" class="flex-1 bg-cyan-500 p-4 rounded-2xl font-black text-black uppercase text-lg">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // ======= COLOQUE SEU LINK DO GOOGLE AQUI =======
        const URL = "https://script.google.com/macros/s/AKfycbybJAi3Js_FDbIQ_s6Mm6-wI-cNE3krCUEurkDWulhpcOr6ur-EQLepQ5cbGGE9x23SoA/exec";
        // ===============================================

        let tank_cap = 53, chart;

        async function sync() {
            try {
                const r = await fetch(URL);
                const d = await r.json();
                const logs = d.logs || d;
                const config = d.config || {};
                
                if (config.car_name) {
                    document.getElementById('car-title').innerText = config.car_name;
                    tank_cap = parseFloat(config.tank_capacity) || 53;
                }

                const last = logs[logs.length - 1];
                const prev = logs[logs.length - 2] || last;

                // FÓRMULAS CONFORME DEFINIDO
                const distTrip = parseFloat(last[4]) || 0; 
                const litersAdded = parseFloat(last[8]) || 1;
                const kmL_atual = distTrip / litersAdded;
                
                // Se Último for "Full Tank", usa Km/L atual. Senão, usa anterior.
                const isFull = last[13] && last[13].toString().includes("Full");
                const kmL_referencia = isFull ? kmL_atual : (parseFloat(prev[12]) || kmL_atual);
                
                const combustivelConsumido = distTrip / kmL_referencia;
                const tanqueRestante = tank_cap - combustivelConsumido;

                // UI UPDATE (LETRAS GRANDES)
                document.getElementById('v-odo').innerText = last[3].toString().padStart(6, '0');
                document.getElementById('v-cons').innerText = kmL_atual.toFixed(2);
                document.getElementById('v-tank').innerText = tanqueRestante.toFixed(1);
                document.getElementById('v-dist').innerText = last[4];
                document.getElementById('v-spent').innerText = combustivelConsumido.toFixed(2);

                // GAUGES
                document.getElementById('f-cons').style.strokeDashoffset = 188.5 - (188.5 * Math.min(kmL_atual/15, 1));
                document.getElementById('f-tank').style.strokeDashoffset = 188.5 - (188.5 * Math.min(tanqueRestante/tank_cap, 1));

                // HISTÓRICO REFINADO
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                logs.slice().reverse().forEach(l => {
                    list.innerHTML += `
                        <div class="panel-sport p-5 flex justify-between items-center bg-zinc-900/30">
                            <div>
                                <p class="text-lg font-black italic text-white uppercase leading-none mb-1">${l[9] || 'Posto'}</p>
                                <p class="text-xs text-gray-500 font-bold">${l[1].split('T')[0]}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold text-cyan-400 leading-none">${l[3]} KM</p>
                                <p class="text-sm text-purple-400 font-bold mt-1">${l[8]} LITROS</p>
                            </div>
                        </div>`;
                });

                renderChart(logs);
                document.getElementById('boot').style.display = 'none';
            } catch (e) { 
                document.getElementById('boot-msg').innerText = "ERRO NA CONEXÃO";
                setTimeout(() => document.getElementById('boot').style.display = 'none', 2000);
            }
        }

        function renderChart(logs) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            const lastData = logs.slice(-8);
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: lastData.map(l => l[1].split('T')[0].substring(5)),
                    datasets: [{
                        data: lastData.map(l => parseFloat(l[12]) || 0),
                        borderColor: '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#444' } }, x: { ticks: { color: '#444' } } } }
            });
        }

        async function saveData() {
            const btn = event.target;
            btn.innerText = "SALVANDO...";
            const payload = {
                odo: document.getElementById('i-odo').value,
                dist: document.getElementById('i-dist').value,
                liters: document.getElementById('i-lit').value,
                total: document.getElementById('i-tot').value,
                station: document.getElementById('i-st').value,
                date: new Date().toLocaleDateString('pt-BR')
            };
            try {
                await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
                closeM();
                sync();
            } catch (e) { alert("Erro ao salvar"); }
            btn.innerText = "SALVAR";
        }

        function tab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            btn.classList.add('active-nav');
        }

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        
        window.onload = sync;
    </script>
</body>
</html>
