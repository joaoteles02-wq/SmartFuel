<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Sport Master V21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --bg: #000; --text: #ffffff; --nav-bg: rgba(15, 15, 15, 0.3); }
        body.light-mode { --bg: #f1f5f9; --text: #000000; --neon: #0284c7; --nav-bg: rgba(255, 255, 255, 0.4); }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; transition: 0.4s; }
        .panel-sport { background: linear-gradient(145deg, #1a1a1a, #000); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; }
        body.light-mode .panel-sport { background: linear-gradient(145deg, #ffffff, #cbd5e1); border-color: #94a3b8; }

        .lcd-display { background: #050505; border-radius: 12px; box-shadow: inset 0 0 20px #000; border: 1px solid #222; }
        body.light-mode .lcd-display { background: #fff; border-color: #94a3b8; box-shadow: inset 0 0 10px #cbd5e1; }
        
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        body.light-mode .digital-glow { text-shadow: none; color: #000; }

        .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 0.3s ease-out; stroke: var(--neon); }
        .tab-content { display: none; height: calc(100vh - 200px); overflow-y: auto; padding: 10px; }
        .active { display: flex; flex-direction: column; }

        .nav-glass {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 72px; background: var(--nav-bg); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; display: flex; justify-content: space-around; align-items: center; z-index: 5000;
        }
        .nav-btn { color: var(--text); opacity: 0.3; transition: 0.3s; }
        .active-nav { opacity: 1 !important; color: var(--neon) !important; }
        
        body.light-mode .main-title, body.light-mode .nav-btn-plus, body.light-mode .btn-save-text, body.light-mode label { color: #000 !important; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 6000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        body.light-mode #modal { background: rgba(255,255,255,0.98); }

        .big-input { background: rgba(128,128,128,0.1); border: 2px solid rgba(128,128,128,0.2); border-radius: 15px; padding: 15px; color: var(--text); font-size: 20px; width: 100%; outline: none; font-weight: bold; }
        .odo-input { background: transparent; border: none; color: var(--neon); font-family: 'Digital Numbers', sans-serif; font-size: 46px; text-align: center; width: 100%; outline: none; }
        
        .segmented-btn { flex: 1; padding: 12px; font-weight: 900; text-transform: uppercase; border: 2px solid #333; transition: 0.3s; font-size: 14px; background: rgba(255,255,255,0.05); color: var(--text); }
        body.light-mode .segmented-btn { border-color: #94a3b8; color: #000; }
        .btn-active { background: var(--neon) !important; color: #000 !important; border-color: var(--neon) !important; }

        .text-danger { color: #ff3b30 !important; }
        .alert-oil { animation: pulseRed 1.5s infinite; color: #ff3b30; font-weight: 900; background: rgba(255, 59, 48, 0.15); padding: 4px 12px; border-radius: 10px; border: 1px solid #ff3b30; font-size: 11px; }
        @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 1.0; } 100% { opacity: 1; } }
        label { font-size: 11px; font-weight: 900; color: #777; text-transform: uppercase; margin-bottom: 4px; display: block; }
        body.light-mode label { color: #000; }
    </style>
</head>
<body class="flex justify-center p-4">

    <!-- BOOT SCREEN -->
    <div id="boot" class="fixed inset-0 bg-black z-[9000] flex flex-col items-center justify-center text-center">
        <div class="digital-glow text-2xl animate-pulse uppercase">Smart Fuel V21</div>
        <p id="boot-msg" class="text-gray-600 mt-4 text-[10px] uppercase font-bold tracking-widest">Sincronizando Sistemas...</p>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-12">
        <header class="mb-4 px-2">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-3xl font-black italic tracking-tighter uppercase main-title">Smart Fuel</h1>
                <button onclick="toggleTheme()" class="panel-sport px-5 py-2 text-[12px] font-black uppercase rounded-full main-title">🌓 MODO</button>
            </div>
            <div class="flex items-center justify-between">
                <span id="ui-car-display" class="text-sm font-black text-cyan-500 uppercase tracking-widest">---</span>
                <div id="oil-alert" class="hidden alert-oil uppercase italic">⚠️ troca de óleo prevista</div>
            </div>
        </header>

        <!-- DASHBOARD (HOME) -->
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-black uppercase mb-3 opacity-60 text-cyan-500">Gasto (L)</p>
                    <svg class="w-full h-20" viewBox="0 0 140 80">
                        <path fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-spent" class="gauge-fill" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-40px] font-black italic text-2xl" id="v-spent">0.00</div>
                </div>
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-black uppercase mb-3 opacity-60 text-cyan-500">Tanque (L)</p>
                    <svg class="w-full h-20" viewBox="0 0 140 80">
                        <path fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-40px] font-black italic text-2xl" id="v-tank">--</div>
                </div>
            </div>

            <div class="panel-sport p-4 text-center">
                <p class="text-[11px] font-black opacity-40 uppercase mb-1 main-title">Odômetro Atual (Simular)</p>
                <div class="lcd-display py-1"><input type="number" id="v-odo" class="odo-input" oninput="recalcHome()"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 text-center flex flex-col justify-center">
                    <p class="text-[10px] font-black uppercase mb-1 opacity-60 text-cyan-400">Km Percorrido</p>
                    <span id="v-dist" class="text-4xl font-black italic tracking-tighter main-title">0</span>
                </div>
                <div class="panel-sport p-4 text-center">
                    <p class="text-[10px] font-black uppercase mb-3 opacity-60 text-cyan-500">Consumo (Km/L)</p>
                    <svg class="w-full h-16" viewBox="0 0 140 80">
                        <path fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="10" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-cons" class="gauge-fill" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div id="v-cons-wrap" class="mt-[-35px] font-black italic text-2xl"><span id="v-cons">--</span></div>
                </div>
            </div>
        </div>

        <!-- TABS AUXILIARES -->
        <div id="history" class="tab-content"><div id="hist-list" class="space-y-3 pb-20"></div></div>
        <div id="charts" class="tab-content justify-center h-full"><div class="panel-sport p-4 h-80 flex flex-col justify-center shadow-2xl"><canvas id="mainChart"></canvas></div></div>

        <div id="settings" class="tab-content pt-2 space-y-4">
            <div class="panel-sport p-5 space-y-4">
                <h3 class="text-md font-black uppercase text-cyan-500 border-b border-white/5 pb-2 main-title">Configurações</h3>
                <label>Selecionar Carro</label><select id="sel-car" class="big-input" onchange="switchVehicle()"></select>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Tanque (L)</label><input type="number" id="set-tank" class="big-input"></div>
                    <div><label>Meta Km/L</label><input type="number" id="set-meta" class="big-input"></div>
                </div>
                <label>Adicionar Novo Veículo</label><input type="text" id="add-car" class="big-input" placeholder="Modelo">
                <button onclick="saveNewCar()" class="w-full panel-sport p-4 rounded-2xl font-black uppercase text-cyan-500 main-title">Sincronizar</button>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav-glass">
            <button onclick="tab('home', this)" class="nav-btn active-nav">HOME</button>
            <button onclick="tab('history', this)" class="nav-btn">HIST</button>
            <div onclick="openM()" class="bg-cyan-500 w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg nav-btn-plus">+</div>
            <button onclick="tab('charts', this)" class="nav-btn">CHRT</button>
            <button onclick="tab('settings', this)" class="nav-btn">SET</button>
        </nav>
    </div>

    <!-- MODAL -->
    <div id="modal">
        <div class="panel-sport w-full p-6 space-y-4 max-h-[95vh] overflow-y-auto">
            <h3 class="text-2xl font-black uppercase italic text-cyan-400 text-center main-title">Novo Abastecimento</h3>
            <div><label>Data</label><input type="date" id="i-date" class="big-input"></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Odômetro</label><input type="number" id="i-odo" class="big-input"></div>
                <div><label>Troca Óleo (Km)</label><input type="number" id="i-oil" class="big-input"></div>
            </div>
            <div><label>Litros</label><input type="number" id="i-lit" step="0.01" class="big-input" oninput="calcP()"></div>
            <div><label>Posto</label><input type="text" id="i-st" list="postos-list" class="big-input" placeholder="Posto..."><datalist id="postos-list"></datalist></div>
            <div>
                <label>Nível do Tanque</label>
                <div class="flex">
                    <button id="btn-full" onclick="setTank('Full Tank - refresh')" class="segmented-btn btn-left main-title btn-active">Cheio</button>
                    <button id="btn-partial" onclick="setTank('Parcial')" class="segmented-btn btn-right main-title">Parcial</button>
                </div>
            </div>
            <div><label>Total R$</label><input type="number" id="i-tot" step="0.01" class="big-input" oninput="calcP()"></div>
            <div class="lcd-display p-4 text-center bg-cyan-400"><label class="text-black font-black uppercase">Preço Unitário</label><div id="v-price" class="text-3xl font-black text-black">R$ 0,00</div></div>
            <div class="flex gap-4 pt-4 pb-4">
                <button onclick="closeM()" class="flex-1 font-black opacity-60 uppercase text-lg main-title">Sair</button>
                <button onclick="saveData()" id="btn-save" class="flex-1 panel-sport p-4 rounded-2xl font-black uppercase text-xl main-title btn-save-text">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxPAcB9qDT4LDG7bMo-RyJpIZIJkJ4x6ZO4zlRCljI1YPzYwLooRNfLSRjma3vkXxZ8/exec";
        let tank_cap = 53, chart, allLogs = [], activeCar = "Hyundai I-30", metaVal = 8.0, oilTarget = 0;
        let lastOdoVal = 0, lastLitros = 0, lastTankType = "Full Tank - refresh", kmLAnterior = 8.0;

        async function sync() {
            try {
                const r = await fetch(URL); 
                const d = await r.json(); 
                allLogs = d.logs || d;
                
                if(d.config) { 
                    activeCar = d.config.active_car || "Hyundai I-30"; 
                    metaVal = parseFloat(d.config.meta) || 8.0; 
                    tank_cap = parseFloat(d.config.tank_capacity) || 53; 
                }

                const carLogs = allLogs.filter(l => l[2] === activeCar);
                const last = carLogs[carLogs.length - 1] || [0,0,activeCar,0,0,0,0,0,0,'Posto',0,0,metaVal,'Full Tank - refresh'];
                const prev = carLogs[carLogs.length - 2] || last;

                lastOdoVal = parseFloat(last[3]) || 0; 
                lastLitros = parseFloat(last[8]) || 0;
                lastTankType = last[13] || "Full Tank - refresh";
                kmLAnterior = parseFloat(prev[12]) || metaVal;
                oilTarget = parseFloat(last[4]) || 0;
                
                document.getElementById('v-odo').value = lastOdoVal;
                document.getElementById('ui-car-display').innerText = activeCar;
                
                recalcHome(); 
                renderHistory(carLogs); 
                renderChart(carLogs); 
            } catch (e) { console.error(e); }
            // FORÇA ESCONDER O BOOT SEMPRE
            document.getElementById('boot').style.display = 'none';
        }

        function recalcHome() {
            // APLICAÇÃO DAS SUAS 4 FÓRMULAS
            const odoAtual = parseFloat(document.getElementById('v-odo').value) || lastOdoVal;

            // 1. "Km percorrido" = "hodômetro atual" - "hodômetro do ultimo abastecimento"
            const trip = Math.max(0, odoAtual - lastOdoVal);

            // 2. "km/L atual" = "Km percorrido" / "litros abastecidos"
            const kmL_atual = lastLitros > 0 ? (trip / lastLitros) : 0;

            // 3. "Combustível Consumido" (Lógica IF)
            let spent = 0;
            if (lastTankType.includes("Full")) {
                // Se Tanque Cheio: "Km percorrido" / "Km/L" Atual
                spent = kmL_atual > 0 ? (trip / kmL_atual) : 0;
            } else {
                // Se Parcial: "Km percorrido" / "Km/L" Anterior
                spent = trip / kmLAnterior;
            }

            // 4. "Tanque (L)" = "capacidade tanque (L)" - "Combustível consumido"
            const remaining = Math.max(0, tank_cap - spent);

            // ATUALIZAÇÃO DA INTERFACE
            document.getElementById('v-dist').innerText = trip.toFixed(0);
            document.getElementById('v-cons').innerText = kmL_atual > 0 ? kmL_atual.toFixed(2) : "--";
            document.getElementById('v-spent').innerText = spent.toFixed(2);
            document.getElementById('v-tank').innerText = remaining.toFixed(1);

            // GAUGES
            document.getElementById('f-cons').style.strokeDashoffset = 188.5 - (188.5 * Math.min(kmL_atual/20, 1));
            document.getElementById('f-tank').style.strokeDashoffset = 188.5 - (188.5 * (remaining/tank_cap));
            document.getElementById('f-spent').style.strokeDashoffset = 188.5 - (188.5 * (spent/tank_cap));

            if (oilTarget > 0 && odoAtual >= (oilTarget - 100)) document.getElementById('oil-alert').classList.remove('hidden');
            else document.getElementById('oil-alert').classList.add('hidden');
        }

        // --- TODAS AS OUTRAS FUNÇÕES ORIGINAIS RESTAURADAS ---
        function setTank(v) { 
            lastTankType = v;
            document.getElementById('btn-full').classList.toggle('btn-active', v.includes('Full'));
            document.getElementById('btn-partial').classList.toggle('btn-active', !v.includes('Full'));
        }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function calcP() { const t=parseFloat(document.getElementById('i-tot').value), l=parseFloat(document.getElementById('i-lit').value); if(t && l) document.getElementById('v-price').innerText="R$ "+(t/l).toFixed(2); }
        async function saveData() { const p={carType:activeCar,odo:document.getElementById('i-odo').value,dist:document.getElementById('i-oil').value,liters:document.getElementById('i-lit').value,total:document.getElementById('i-tot').value,station:document.getElementById('i-st').value,tankLevel:lastTankType,date:document.getElementById('i-date').value}; await fetch(URL,{method:'POST',body:JSON.stringify(p)}); closeM(); sync(); }
        function renderHistory(logs) { document.getElementById('hist-list').innerHTML=logs.slice().reverse().map(l=>`<div class="panel-sport p-5 flex justify-between items-center mb-3 border-none bg-zinc-900/10"><div><p class="text-lg font-black uppercase italic main-title">${l[9]||'Posto'}</p><p class="text-xs opacity-50 main-title">${new Date(l[1]).toLocaleDateString()}</p></div><div class="text-right"><p class="text-lg font-bold ${parseFloat(l[12])<metaVal?'text-danger':'text-cyan-400'}">${parseFloat(l[12]).toFixed(2)} Km/L</p><p class="text-xs font-black opacity-30 uppercase main-title">${l[3]} KM | ${l[8]} L</p></div></div>`).join(''); }
        function renderChart(logs) { const ctx=document.getElementById('mainChart').getContext('2d'); if(chart) chart.destroy(); const data=logs.slice(-8); chart=new Chart(ctx,{type:'line',data:{labels:data.map(l=>l[1].split('T')[0].substring(5)),datasets:[{data:data.map(l=>l[12]),borderColor:'#00f2ff',fill:true,tension:0.4,backgroundColor:'rgba(0, 242, 255, 0.1)'}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888',font:{size:14}},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{color:'#888'}}}}}); }
        function tab(id,btn) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(id).classList.add('active'); if(btn) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active-nav')); btn.classList.add('active-nav'); } }
        function openM() { document.getElementById('modal').style.display='flex'; document.getElementById('i-date').valueAsDate=new Date(); }
        function closeM() { document.getElementById('modal').style.display='none'; }
        function switchVehicle() { activeCar=document.getElementById('sel-car').value; sync(); }
        function saveNewCar() { alert("Função de novo veículo sincronizada com planilha."); sync(); }
        
        window.onload = sync;
    </script>
</body>
</html>
