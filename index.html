<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Sport Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --purple: #bc13fe; }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .panel-sport { background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid #333; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.9); }
        .lcd-display { background: #050505; border-radius: 12px; box-shadow: inset 0 0 20px #000; border: 1px solid #222; }
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 1.5s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .tab-content { display: none; height: calc(100vh - 220px); overflow-y: auto; padding: 5px; }
        .active { display: block; }
        .nav-btn { transition: 0.3s; opacity: 0.3; }
        .active-nav { opacity: 1; transform: scale(1.2); color: var(--neon); }
        
        /* Modal e Inputs Gigantes */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .big-input { background: #111; border: 2px solid #444; border-radius: 15px; padding: 18px; color: white; font-size: 22px; width: 100%; outline: none; font-weight: bold; }
        .big-input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        label { font-size: 14px; font-weight: 900; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        /* Odometro Input na Home */
        .odo-input { background: transparent; border: none; color: var(--neon); font-family: 'Digital Numbers', sans-serif; font-size: 42px; text-align: center; width: 100%; outline: none; }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div id="boot" class="fixed inset-0 bg-black z-[9000] flex flex-col items-center justify-center">
        <div class="digital-glow text-2xl animate-pulse">SMART FUEL</div>
        <p id="boot-msg" class="text-gray-600 mt-4 font-bold uppercase tracking-widest">Iniciando Computador de Bordo...</p>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-2">
        
        <header class="text-center mb-4">
            <h1 id="car-title" class="text-2xl font-black italic tracking-tighter uppercase text-white">Smart Fuel</h1>
            <div class="h-1 w-12 bg-cyan-500 mx-auto mt-1 rounded-full shadow-[0_0_10px_#00f2ff]"></div>
        </header>

        <!-- DASHBOARD -->
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-5 text-center">
                    <p class="text-[12px] font-black text-cyan-400 uppercase mb-3">Consumo</p>
                    <svg class="w-full h-24 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-cons" class="gauge-fill stroke-cyan-500" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-cons" class="text-3xl font-black italic">--</span></div>
                </div>
                <div class="panel-sport p-5 text-center">
                    <p class="text-[12px] font-black text-purple-500 uppercase mb-3">Tanque</p>
                    <svg class="w-full h-24 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill stroke-purple-600" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-tank" class="text-3xl font-black italic">--</span></div>
                </div>
            </div>

            <!-- Odômetro Interativo -->
            <div class="panel-sport p-5 text-center">
                <p class="text-[11px] font-black text-gray-500 uppercase mb-2">Quilometragem Atual (Toque p/ alterar)</p>
                <div class="lcd-display py-2">
                    <input type="number" id="v-odo" class="odo-input" value="000000" oninput="recalcHome()">
                </div>
            </div>

            <!-- Cards Detalhados -->
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-5 lcd-display border-none text-center">
                    <p class="text-[12px] font-black text-gray-400 uppercase mb-1">Trip (Km)</p>
                    <span id="v-dist" class="text-3xl font-black italic text-white">0</span>
                </div>
                <div class="panel-sport p-5 lcd-display border-none text-center">
                    <p class="text-[12px] font-black text-gray-400 uppercase mb-1">Gasto (L)</p>
                    <span id="v-spent" class="text-3xl font-black text-purple-400 italic">0</span>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div id="history" class="tab-content">
            <h2 class="text-xl font-black uppercase italic mb-4 border-l-4 border-cyan-500 pl-3">Log de Atividades</h2>
            <div id="hist-list" class="space-y-3 pb-20"></div>
        </div>

        <!-- GRÁFICO -->
        <div id="charts" class="tab-content">
            <h2 class="text-xl font-black uppercase italic mb-4 border-l-4 border-purple-500 pl-3">Performance</h2>
            <div class="panel-sport p-4 h-64 shadow-2xl"><canvas id="mainChart"></canvas></div>
        </div>

        <!-- MENU INFERIOR -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] h-20 panel-sport flex justify-around items-center px-6 z-[4000]">
            <button onclick="tab('home', this)" class="nav-btn active-nav text-3xl">🏠</button>
            <button onclick="tab('history', this)" class="nav-btn text-3xl">📊</button>
            <div onclick="openM()" class="bg-cyan-500 w-16 h-16 rounded-full flex items-center justify-center text-black text-4xl font-bold shadow-[0_0_20px_#00f2ff] -translate-y-8 border-4 border-black">+</div>
            <button onclick="tab('charts', this)" class="nav-btn text-3xl">📈</button>
            <button class="nav-btn text-3xl opacity-20">⚙️</button>
        </nav>
    </div>

    <!-- MODAL FORMULÁRIO -->
    <div id="modal">
        <div class="panel-sport w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black uppercase italic text-cyan-400 mb-4">Novo Abastecimento</h3>
            
            <div class="grid grid-cols-2 gap-4">
                <div><label>Odômetro</label><input type="number" id="i-odo" class="big-input"></div>
                <div><label>Km Viagem</label><input type="number" id="i-dist" class="big-input"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div><label>Litros</label><input type="number" id="i-lit" step="0.01" class="big-input" oninput="calcPrice()"></div>
                <div><label>Total R$</label><input type="number" id="i-tot" step="0.01" class="big-input" oninput="calcPrice()"></div>
            </div>

            <div class="lcd-display p-4 text-center">
                <label>Preço por Litro</label>
                <div id="v-price" class="text-3xl font-black text-cyan-400">R$ 0,00</div>
            </div>

            <div>
                <label>Posto</label>
                <input type="text" id="i-st" list="postos-list" class="big-input" placeholder="Buscar posto...">
                <datalist id="postos-list"></datalist>
            </div>

            <div>
                <label>Nível do Tanque</label>
                <select id="i-tank-lvl" class="big-input appearance-none">
                    <option value="Full Tank - refresh">Tanque Cheio</option>
                    <option value="Parcial">Parcial</option>
                </select>
            </div>

            <div class="flex gap-4 pt-4 pb-4">
                <button onclick="closeM()" class="flex-1 font-bold text-gray-500 uppercase text-lg">Sair</button>
                <button onclick="saveData()" id="btn-save" class="flex-1 bg-cyan-500 p-4 rounded-2xl font-black text-black uppercase text-xl">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // ======= COLE SEU LINK DO GOOGLE ABAIXO =======
        const URL = "https://script.google.com/macros/s/AKfycbybJAi3Js_FDbIQ_s6Mm6-wI-cNE3krCUEurkDWulhpcOr6ur-EQLepQ5cbGGE9x23SoA/exec";
        // ===============================================

        let tank_cap = 53, chart, lastEntryDb, allLogs = [];

        async function sync() {
            try {
                const r = await fetch(URL);
                const d = await r.json();
                allLogs = d.logs || d;
                lastEntryDb = allLogs[allLogs.length - 1];

                // Autocomplete de postos
                const postos = [...new Set(allLogs.map(l => l[9]))];
                const dl = document.getElementById('postos-list');
                dl.innerHTML = postos.map(p => `<option value="${p}">`).join('');

                // Inicializa Home com o último odômetro conhecido
                document.getElementById('v-odo').value = lastEntryDb[3];
                recalcHome();
                
                renderHistory();
                renderChart();
                document.getElementById('boot').style.display = 'none';
            } catch (e) { document.getElementById('boot-msg').innerText = "ERRO DE CONEXÃO"; }
        }

        function recalcHome() {
            const currentOdo = parseFloat(document.getElementById('v-odo').value) || 0;
            const dbOdo = parseFloat(lastEntryDb[3]);
            const trip = currentOdo - dbOdo;
            
            // Fórmulas
            const prevKmL = parseFloat(lastEntryDb[12]) || 7.0;
            const isLastFull = lastEntryDb[13].includes("Full");
            
            // Se o último foi cheio, usamos o consumo médio real. Se foi parcial, o anterior.
            const consumed = trip / prevKmL;
            const remaining = tank_cap - consumed;

            document.getElementById('v-cons').innerText = prevKmL.toFixed(2);
            document.getElementById('v-tank').innerText = Math.max(0, remaining).toFixed(1);
            document.getElementById('v-dist').innerText = trip > 0 ? trip : 0;
            document.getElementById('v-spent').innerText = consumed > 0 ? consumed.toFixed(2) : 0;

            // Gauges
            document.getElementById('f-cons').style.strokeDashoffset = 188.5 - (188.5 * Math.min(prevKmL/15, 1));
            document.getElementById('f-tank').style.strokeDashoffset = 188.5 - (188.5 * Math.min(remaining/tank_cap, 1));
        }

        function calcPrice() {
            const tot = document.getElementById('i-tot').value;
            const lit = document.getElementById('i-lit').value;
            if(tot && lit) document.getElementById('v-price').innerText = "R$ " + (tot/lit).toFixed(2);
        }

        async function saveData() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "PROCESSANDO...";
            const payload = {
                odo: document.getElementById('i-odo').value,
                dist: document.getElementById('i-dist').value,
                liters: document.getElementById('i-lit').value,
                total: document.getElementById('i-tot').value,
                station: document.getElementById('i-st').value,
                tankLevel: document.getElementById('i-tank-lvl').value,
                date: new Date().toLocaleDateString('pt-BR')
            };
            try {
                await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
                closeM(); sync();
            } catch (e) { alert("Erro ao salvar"); }
            btn.innerText = "SALVAR";
        }

        function renderHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = allLogs.slice().reverse().map(l => `
                <div class="panel-sport p-5 flex justify-between items-center bg-zinc-900/40 mb-3">
                    <div>
                        <p class="text-xl font-black italic text-white uppercase leading-none mb-1">${l[9] || 'POSTO'}</p>
                        <p class="text-xs text-gray-500 font-bold">${l[1].split('T')[0]}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold text-cyan-400 leading-none">${l[3]} KM</p>
                        <p class="text-sm text-purple-400 font-black mt-1">${l[8]} L</p>
                    </div>
                </div>`).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            const lastData = allLogs.slice(-8);
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: lastData.map(l => l[1].split('T')[0].substring(5)),
                    datasets: [{ data: lastData.map(l => parseFloat(l[12]) || 0), borderColor: '#00f2ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,242,255,0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#444' } }, x: { ticks: { color: '#444' } } } }
            });
        }

        function tab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            btn.classList.add('active-nav');
        }
        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        window.onload = sync;
    </script>
</body>
</html>
