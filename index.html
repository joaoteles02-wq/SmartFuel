<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Sport Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --purple: #bc13fe; }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .panel-sport { background: linear-gradient(145deg, #151515, #000); border: 1px solid #222; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .lcd-display { background: #080808; border-radius: 10px; box-shadow: inset 0 0 15px #000; }
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 12px var(--neon); }
        .gauge-fill { fill: none; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 2.5s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .tab-content { display: none; height: calc(100vh - 240px); overflow-y: auto; padding-right: 5px; }
        .active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { transition: 0.3s; filter: grayscale(1); opacity: 0.3; }
        .nav-btn.active-nav { filter: grayscale(0); opacity: 1; transform: scale(1.1); }
        #boot { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
    </style>
</head>
<body class="flex justify-center p-4">

    <!-- Tela de Carregamento -->
    <div id="boot">
        <div class="digital-glow text-lg animate-pulse uppercase tracking-[0.4em]">Checking System</div>
        <p id="boot-msg" class="text-[10px] text-gray-600 mt-4 uppercase font-bold tracking-widest">Connectig to Cloud...</p>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-6">
        <header class="text-center mb-6">
            <h1 id="car-title" class="text-2xl font-black italic tracking-tighter uppercase text-gray-400">Smart Fuel Sport</h1>
            <div id="ui-accent" class="h-1 w-12 bg-cyan-500 mx-auto mt-1 rounded-full"></div>
        </header>

        <!-- DASHBOARD -->
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-5 text-center">
                    <p class="text-[11px] font-black text-cyan-400 uppercase mb-4">Efficiency</p>
                    <svg class="w-full h-20 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-cons" class="gauge-fill stroke-cyan-500" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-cons" class="text-2xl font-black italic">0.0</span><p class="text-[8px] opacity-30 font-bold uppercase">Km/L</p></div>
                </div>
                <div class="panel-sport p-5 text-center">
                    <p class="text-[11px] font-black text-purple-500 uppercase mb-4">Fuel Level</p>
                    <svg class="w-full h-20 mx-auto" viewBox="0 0 140 80">
                        <path fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill stroke-purple-600" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-tank" class="text-2xl font-black italic">0.0</span><p class="text-[8px] opacity-30 font-bold uppercase">Litros</p></div>
                </div>
            </div>

            <div class="panel-sport p-6 text-center">
                <p class="text-[11px] font-black text-gray-500 uppercase mb-3">Total Odometer</p>
                <div class="lcd-display py-3 px-6 inline-block border border-white/5">
                    <span id="v-odo" class="digital-glow text-3xl tracking-[4px]">000000</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 lcd-display border-none">
                    <p class="text-[10px] font-black text-gray-500 uppercase mb-1">Trip Trip</p>
                    <span id="v-dist" class="text-xl font-black italic">0</span><span class="text-[10px] ml-1 opacity-20">Km</span>
                </div>
                <div class="panel-sport p-4 lcd-display border-none">
                    <p class="text-[10px] font-black text-gray-500 uppercase mb-1">Fuel Spent</p>
                    <span id="v-spent" class="text-xl font-black text-purple-400 italic">0</span><span class="text-[10px] ml-1 opacity-20">Lts</span>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div id="history" class="tab-content">
            <h2 class="text-lg font-black uppercase italic mb-4 border-l-4 border-cyan-500 pl-3">Telemetry Log</h2>
            <div id="hist-list" class="space-y-3 pb-10"></div>
        </div>

        <!-- GRÁFICO -->
        <div id="charts" class="tab-content">
            <h2 class="text-lg font-black uppercase italic mb-4 border-l-4 border-purple-500 pl-3">Performance</h2>
            <div class="panel-sport p-4 h-64"><canvas id="mainChart"></canvas></div>
        </div>

        <!-- MENU -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] h-20 panel-sport flex justify-around items-center px-6 z-[2000]">
            <button onclick="changeTab('home', this)" class="nav-btn active-nav text-2xl">🏠</button>
            <button onclick="changeTab('history', this)" class="nav-btn text-2xl">📊</button>
            <div class="bg-cyan-500 w-14 h-14 rounded-full flex items-center justify-center text-black text-3xl font-bold shadow-[0_0_15px_#06b6d4] -translate-y-8">+</div>
            <button onclick="changeTab('charts', this)" class="nav-btn text-2xl">📈</button>
            <button class="nav-btn text-2xl opacity-20">⚙️</button>
        </nav>
    </div>

    <script>
        // ======= COLOQUE O SEU LINK AQUI =======
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybJAi3Js_FDbIQ_s6Mm6-wI-cNE3krCUEurkDWulhpcOr6ur-EQLepQ5cbGGE9x23SoA/exec";
        // =======================================

        let tank_cap = 53, chart;

        async function sync() {
            const bootMsg = document.getElementById('boot-msg');
            try {
                bootMsg.innerText = "Fetching data...";
                const r = await fetch(SCRIPT_URL);
                const d = await r.json();
                
                // Suporta formato novo {logs, config} ou formato antigo [array]
                const logs = d.logs || d;
                const config = d.config || {};
                
                if (config.car_name) {
                    document.getElementById('car-title').innerText = config.car_name;
                    tank_cap = parseFloat(config.tank_capacity) || 53;
                }

                const last = logs[logs.length - 1];
                const prev = logs[logs.length - 2] || last;

                const distTrip = parseFloat(last[4]) || 0; 
                const litersAdded = parseFloat(last[8]) || 1;
                const kmL_atual = distTrip / litersAdded;
                const isFull = last[13] ? last[13].toString().includes("Full") : true;

                let consumed = isFull ? (distTrip / kmL_atual) : (distTrip / (parseFloat(prev[12]) || kmL_atual));
                const remaining = tank_cap - consumed;

                // Atualiza UI
                document.getElementById('v-odo').innerText = last[3].toString().padStart(6, '0');
                document.getElementById('v-cons').innerText = kmL_atual.toFixed(2);
                document.getElementById('v-tank').innerText = remaining.toFixed(1);
                document.getElementById('v-dist').innerText = last[4] || "0";
                document.getElementById('v-spent').innerText = last[8] || "0";

                // Gauges
                document.getElementById('f-cons').style.strokeDashoffset = 188.5 - (188.5 * Math.min(kmL_atual/15, 1));
                document.getElementById('f-tank').style.strokeDashoffset = 188.5 - (188.5 * Math.min(remaining/tank_cap, 1));

                // Histórico
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                logs.slice().reverse().forEach(l => {
                    list.innerHTML += `
                        <div class="panel-sport p-4 flex justify-between items-center bg-zinc-900/20 mb-2">
                            <div>
                                <p class="font-black italic text-sm text-white uppercase">${l[9] || 'Posto'}</p>
                                <p class="text-[10px] text-gray-500 font-bold">${l[1] ? l[1].split('T')[0] : 'Data'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-cyan-400">ODO: ${l[3]} Km</p>
                                <p class="text-[10px] text-purple-400 font-bold">${l[8]} Lts</p>
                            </div>
                        </div>`;
                });

                renderChart(logs);
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => document.getElementById('boot').style.display = 'none', 500);

            } catch (e) { 
                console.error(e);
                bootMsg.innerText = "ERROR: CHECK GOOGLE SCRIPT URL";
                bootMsg.style.color = "red";
                // Força saída do boot para mostrar a tela mesmo com erro
                setTimeout(() => document.getElementById('boot').style.display = 'none', 3000);
            }
        }

        function renderChart(logs) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            const lastData = logs.slice(-8);
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: lastData.map(l => l[1] ? l[1].split('T')[0].substring(5) : ''),
                    datasets: [{
                        data: lastData.map(l => parseFloat(l[12]) || 0),
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 2, pointRadius: 2
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#333' } } } }
            });
        }

        function changeTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            btn.classList.add('active-nav');
        }

        window.onload = sync;
    </script>
</body>
</html>
