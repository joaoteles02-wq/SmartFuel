<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Fuel Master V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-numbers');
        :root { --neon: #00f2ff; --neon-muted: #008891; --bg: #000; --panel: linear-gradient(145deg, #1a1a1a, #000); }
        
        body.light-mode { --bg: #f0f4f8; --panel: linear-gradient(145deg, #ffffff, #d1d5db); --neon: #0066ff; --neon-muted: #0044aa; }

        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; transition: 0.3s; }
        .panel-sport { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lcd-display { background: #050505; border-radius: 12px; box-shadow: inset 0 0 20px #000; border: 1px solid #222; }
        body.light-mode .lcd-display { background: #fff; border-color: #ccc; box-shadow: inset 0 0 10px #ddd; }
        
        .digital-glow { font-family: 'Digital Numbers', sans-serif; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        body.light-mode .digital-glow { text-shadow: none; color: #000; }

        .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: 1.5s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .tab-content { display: none; height: calc(100vh - 220px); overflow-y: auto; padding: 5px; }
        .active { display: block; }
        .nav-btn { transition: 0.3s; opacity: 0.3; color: white; }
        body.light-mode .nav-btn { color: #000; }
        .active-nav { opacity: 1 !important; transform: scale(1.2); color: var(--neon) !important; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 20px; align-items: center; justify-content: center; overflow-y: auto; }
        .big-input { background: rgba(0,0,0,0.3); border: 2px solid #444; border-radius: 15px; padding: 15px; color: inherit; font-size: 20px; width: 100%; outline: none; font-weight: bold; }
        .odo-input { background: transparent; border: none; color: var(--neon); font-family: 'Digital Numbers', sans-serif; font-size: 42px; text-align: center; width: 100%; outline: none; }
        .danger-text { color: #ff3333 !important; }
        label { font-size: 11px; font-weight: 900; color: #777; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div id="boot" class="fixed inset-0 bg-black z-[9000] flex flex-col items-center justify-center">
        <div class="digital-glow text-2xl animate-pulse uppercase">Smart Fuel Master</div>
    </div>

    <div class="w-full max-w-sm h-full flex flex-col pt-2">
        <header class="flex justify-between items-center mb-4 px-2">
            <button onclick="toggleTheme()" class="panel-sport p-2 text-[10px] font-bold uppercase border-none">🌓 MODO</button>
            <h1 id="ui-car-display" class="text-xl font-black italic tracking-tighter uppercase">Smart Fuel</h1>
            <div class="h-1 w-12 bg-cyan-500 rounded-full shadow-[0_0_10px_#00f2ff]"></div>
        </header>

        <!-- DASHBOARD -->
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 text-center">
                    <p class="text-[11px] font-black uppercase mb-1 text-cyan-400">Consumo (Km/L)</p>
                    <svg class="w-full h-24" viewBox="0 0 140 80">
                        <path fill="none" stroke="#222" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-cons" class="gauge-fill stroke-cyan-500" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-cons" class="text-3xl font-black italic">--</span></div>
                </div>
                <div class="panel-sport p-4 text-center">
                    <p class="text-[11px] font-black uppercase mb-4 opacity-40">Tanque (L)</p>
                    <svg class="w-full h-24" viewBox="0 0 140 80">
                        <path fill="none" stroke="#222" stroke-width="12" d="M 20 70 A 50 50 0 1 1 120 70" />
                        <path id="f-tank" class="gauge-fill stroke-cyan-800" d="M 20 70 A 50 50 0 1 1 120 70" />
                    </svg>
                    <div class="mt-[-45px]"><span id="v-tank" class="text-3xl font-black italic">--</span></div>
                </div>
            </div>

            <div class="panel-sport p-5 text-center">
                <p class="text-[11px] font-black text-gray-500 uppercase mb-2">Km Atual</p>
                <div class="lcd-display py-2"><input type="number" id="v-odo" class="odo-input" inputmode="decimal" oninput="recalcHome()"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="panel-sport p-4 lcd-display border-none text-center bg-cyan-900/10">
                    <p class="text-[12px] font-black opacity-40 uppercase">Trip Km</p>
                    <span id="v-dist" class="text-3xl font-black italic">0</span>
                </div>
                <div class="panel-sport p-4 lcd-display border-none text-center bg-cyan-900/10">
                    <p class="text-[12px] font-black opacity-40 uppercase">Gasto L</p>
                    <span id="v-spent" class="text-3xl font-black italic text-cyan-400">0</span>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div id="history" class="tab-content"><div id="hist-list" class="space-y-3 pb-20"></div></div>

        <!-- GRÁFICO -->
        <div id="charts" class="tab-content"><div class="panel-sport p-4 h-72"><canvas id="mainChart"></canvas></div></div>

        <!-- CONFIG -->
        <div id="settings" class="tab-content pt-2 space-y-4">
            <div class="panel-sport p-5 space-y-4">
                <h3 class="text-md font-black uppercase text-cyan-400 border-b border-cyan-900 pb-2">Configurar Veículo</h3>
                <label>Veículo Selecionado</label>
                <select id="sel-car" class="big-input" onchange="switchVehicle()"></select>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>Tanque (L)</label>
                        <input type="number" id="set-tank" class="big-input" inputmode="decimal" value="53">
                    </div>
                    <div>
                        <label>Meta (Km/L)</label>
                        <input type="number" id="set-meta" class="big-input" inputmode="decimal" value="8.0">
                    </div>
                </div>

                <label>Cadastrar Novo Carro</label>
                <input type="text" id="add-car" class="big-input" placeholder="Ex: Civic G10">
                
                <button onclick="saveNewCar()" class="w-full bg-cyan-500 p-4 rounded-2xl font-black text-black uppercase shadow-lg shadow-cyan-500/40">Salvar Alterações</button>
            </div>
        </div>

        <!-- NAV -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] h-20 panel-sport flex justify-around items-center px-6 z-[4000]">
            <button onclick="tab('home', this)" class="nav-btn active-nav text-3xl">🏠</button>
            <button onclick="tab('history', this)" class="nav-btn text-3xl">📊</button>
            <div onclick="openM()" class="bg-cyan-500 w-16 h-16 rounded-full flex items-center justify-center text-black text-4xl font-bold shadow-[0_0_20px_#00f2ff] -translate-y-8 border-4 border-black">+</div>
            <button onclick="tab('charts', this)" class="nav-btn text-3xl">📈</button>
            <button onclick="tab('settings', this)" class="nav-btn text-3xl">⚙️</button>
        </nav>
    </div>

    <!-- MODAL NOVO ABASTECIMENTO -->
    <div id="modal">
        <div class="panel-sport w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black uppercase text-cyan-400 text-center">Registro de Abastecimento</h3>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Odômetro</label><input type="number" id="i-odo" class="big-input" inputmode="decimal"></div>
                <div><label>Km Viagem</label><input type="number" id="i-dist" class="big-input" inputmode="decimal"></div>
            </div>
            <div><label>Litros Abastecidos</label><input type="number" id="i-lit" step="0.01" class="big-input" inputmode="decimal" oninput="calcP()"></div>
            <div><label>Nível do Tanque</label>
                <select id="i-tank-lvl" class="big-input" onchange="document.getElementById('i-tot').disabled=false">
                    <option value="">Selecione...</option>
                    <option value="Full Tank - refresh">Tanque Cheio</option>
                    <option value="Parcial">Parcial</option>
                </select>
            </div>
            <div><label>Valor Total R$</label><input type="number" id="i-tot" step="0.01" class="big-input" disabled oninput="calcP()"></div>
            <div class="lcd-display p-4 text-center"><label>Preço por Litro</label><div id="v-price" class="text-3xl font-black text-cyan-400">R$ 0,00</div></div>
            <label>Posto de Combustível</label>
            <input type="text" id="i-st" list="postos-list" class="big-input" placeholder="Buscar...">
            <datalist id="postos-list"></datalist>
            <div class="flex gap-4 pt-2">
                <button onclick="closeM()" class="flex-1 font-bold opacity-50 uppercase">Cancelar</button>
                <button onclick="saveData()" id="btn-save" class="flex-1 bg-cyan-500 p-4 rounded-2xl font-black text-black uppercase">Gravar Dados</button>
            </div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbx4gPoYfO0y3vUW47XseKMifOR9QTDQVMziYa-RB0TKWxiGI8WuaAmeh36JG8_eViJMJA/exec";
        let tank_cap = 53, chart, allLogs = [], activeCar = "Hyundai I-30", metaVal = 8.0;

        async function sync() {
            try {
                const r = await fetch(URL);
                const d = await r.json();
                allLogs = d.logs;
                
                if(d.config) {
                    activeCar = d.config.active_car || "Hyundai I-30";
                    metaVal = parseFloat(d.config.meta) || 8.0;
                    tank_cap = parseFloat(d.config.tank_capacity) || 53;
                    document.getElementById('set-meta').value = metaVal;
                    document.getElementById('set-tank').value = tank_cap;
                }

                const cars = d.vehicles.length > 0 ? d.vehicles : ["Hyundai I-30"];
                document.getElementById('sel-car').innerHTML = cars.map(c => `<option value="${c}" ${c==activeCar?'selected':''}>${c}</option>`).join('');
                document.getElementById('ui-car-display').innerText = activeCar;

                const carLogs = allLogs.filter(l => l[2] === activeCar);
                const last = carLogs[carLogs.length - 1] || [0,0,activeCar,0,0,0,0,0,0,'Posto',0,0,0,'Full'];
                
                document.getElementById('v-odo').value = last[3];
                recalcHome();
                renderHistory(carLogs);
                renderChart(carLogs);
                document.getElementById('boot').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function recalcHome() {
            const carLogs = allLogs.filter(l => l[2] === activeCar);
            const last = carLogs[carLogs.length - 1] || [0,0,activeCar,0,0,0,0,0,0,'Posto',0,0,0,'Full'];
            const odo = parseFloat(document.getElementById('v-odo').value) || 0;
            const trip = odo - last[3];
            const lastKmL = parseFloat(last[12]) || metaVal;
            
            const consumed = trip / lastKmL;
            const remaining = tank_cap - consumed;

            const vCons = document.getElementById('v-cons');
            vCons.innerText = lastKmL.toFixed(2);
            vCons.className = lastKmL < metaVal ? "text-3xl font-black italic danger-text" : "text-3xl font-black italic text-cyan-400";

            document.getElementById('v-tank').innerText = Math.max(0, remaining).toFixed(1);
            document.getElementById('v-dist').innerText = trip > 0 ? trip : 0;
            document.getElementById('v-spent').innerText = consumed > 0 ? consumed.toFixed(2) : 0;

            // Gauge Fill Fix: 188.5 is full arc. We compare current Km/L with Meta.
            const consPerc = Math.min(lastKmL / (metaVal * 1.5), 1); 
            document.getElementById('f-cons').style.strokeDashoffset = 188.5 - (188.5 * consPerc);
            
            const tankPerc = Math.min(remaining / tank_cap, 1);
            document.getElementById('f-tank').style.strokeDashoffset = 188.5 - (188.5 * tankPerc);
        }

        async function saveNewCar() {
            const newCarInput = document.getElementById('add-car').value;
            const payload = { 
                active_car: newCarInput || activeCar, 
                meta: document.getElementById('set-meta').value, 
                tank_capacity: document.getElementById('set-tank').value 
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify({ type: 'config', payload: payload }) });
            location.reload();
        }

        function switchVehicle() {
            activeCar = document.getElementById('sel-car').value;
            saveNewCar();
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function calcP() { const t=document.getElementById('i-tot').value, l=document.getElementById('i-lit').value; if(t&&l) document.getElementById('v-price').innerText="R$ "+(t/l).toFixed(2); }
        
        async function saveData() {
            const p = { 
                carType: activeCar, odo: document.getElementById('i-odo').value, 
                dist: document.getElementById('i-dist').value, liters: document.getElementById('i-lit').value, 
                total: document.getElementById('i-tot').value, station: document.getElementById('i-st').value, 
                tankLevel: document.getElementById('i-tank-lvl').value, date: new Date().toISOString() 
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(p) });
            closeM(); sync();
        }

        function renderHistory(logs) {
            document.getElementById('hist-list').innerHTML = logs.slice().reverse().map(l => {
                const kml = parseFloat(l[12]);
                const isDanger = kml < metaVal;
                return `
                <div class="panel-sport p-5 flex justify-between bg-zinc-900/40 mb-3">
                    <div><p class="text-lg font-black uppercase italic">${l[9] || 'Posto'}</p><p class="text-xs opacity-50">${l[1].split('T')[0]}</p></div>
                    <div class="text-right">
                        <p class="text-lg font-bold ${isDanger?'danger-text':'text-cyan-400'}">${kml.toFixed(2)} Km/L</p>
                        <p class="text-xs font-black opacity-30 uppercase">${l[3]} KM | ${l[8]} L</p>
                    </div>
                </div>`;
            }).join('');
        }

        function renderChart(logs) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            const data = logs.slice(-8);
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(l => l[1].split('T')[0].substring(5)),
                    datasets: [{ 
                        data: data.map(l => l[12]), 
                        borderColor: '#00f2ff', 
                        fill: true, 
                        tension: 0.4,
                        backgroundColor: 'rgba(0, 242, 255, 0.1)' 
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { ticks: { color: '#888', font: { size: 14, weight: 'bold' } }, grid: { color: '#222' } },
                        x: { ticks: { color: '#888', font: { size: 12, weight: 'bold' } } }
                    } 
                }
            });
        }

        function tab(id, btn) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav')); btn.classList.add('active-nav'); }
        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        window.onload = sync;
    </script>
</body>
</html>
